<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KDS Setup</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);
  height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px}
.header{text-align:center;color:#fff}
.header svg{color:#f97316}
.header h1{font-size:26px;font-weight:700;margin-top:10px}
.header p{color:#94a3b8;font-size:14px;margin-top:4px}
.box{background:#fff;border-radius:16px;padding:28px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.field input{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:15px;color:#1e293b;background:#fff;font-family:inherit;outline:none}
.field input:focus{border-color:#f97316}
.hint{font-size:11px;color:#94a3b8;margin-top:4px;display:block;line-height:1.4}
.error{color:#ef4444;font-size:12px;text-align:center;margin-bottom:12px;min-height:16px;line-height:1.4}
.btn{width:100%;padding:13px;background:#f97316;color:#fff;border:none;border-radius:8px;
  font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
.btn:hover{background:#ea6c00}
.btn:disabled{background:#94a3b8;cursor:not-allowed}
.note{font-size:11px;color:#64748b;text-align:center;margin-top:10px}
.mode-tabs{display:flex;gap:3px;background:#f1f5f9;border-radius:9px;padding:3px;margin-bottom:18px}
.mode-tab{flex:1;padding:8px 4px;border-radius:7px;border:none;font-size:12px;font-weight:700;
  cursor:pointer;color:#64748b;background:none;font-family:inherit;transition:.15s}
.mode-tab.active{background:#fff;color:#f97316;box-shadow:0 1px 4px rgba(0,0,0,.12)}
</style>
</head>
<body>
<div class="header">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="56" height="56"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M7 8h2M7 12h10M13 8h4"/></svg>
  <h1>Kitchen Display Setup</h1>
  <p>Configure this KDS screen before first use</p>
</div>
<div class="box">
  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-local" onclick="setMode('local')">🌐 Local Network</button>
    <button class="mode-tab" id="tab-cloud" onclick="setMode('cloud')">☁️ Cloud Server</button>
  </div>

  <div id="local-section">
    <div class="field">
      <label>Server LAN IP Address</label>
      <input id="ip" type="text" placeholder="192.168.1.100" autocomplete="off"
        onkeydown="if(event.key==='Enter')document.getElementById('mid').focus()">
      <span class="hint">IP of the server PC on your local network (port 3001)</span>
    </div>
  </div>

  <div id="cloud-section" style="display:none">
    <div class="field">
      <label>Cloud Server URL</label>
      <input id="cloud-url" type="url" placeholder="https://mypos.railway.app" autocomplete="off"
        onkeydown="if(event.key==='Enter')document.getElementById('mid').focus()">
      <span class="hint">Full URL of your cloud-hosted POS server (internet required)</span>
    </div>
  </div>

  <div class="field">
    <label>Machine ID (Screen Name)</label>
    <input id="mid" type="text" placeholder="KDS-01" autocomplete="off"
      onkeydown="if(event.key==='Enter')connect()">
    <span class="hint">Unique name for this screen — e.g. KDS-01, KDS-GRILL</span>
  </div>
  <div class="error" id="err"></div>
  <button class="btn" id="btn" onclick="connect()">▶ Connect (goes fullscreen)</button>
  <p class="note">Press F11 or Esc to exit fullscreen</p>
</div>
<script>
const params = new URLSearchParams(location.search);
if (params.get('error')) document.getElementById('err').textContent = params.get('error');

let currentMode = 'local';

function setMode(mode) {
  currentMode = mode;
  const isCloud = mode === 'cloud';
  document.getElementById('tab-local').classList.toggle('active', !isCloud);
  document.getElementById('tab-cloud').classList.toggle('active', isCloud);
  document.getElementById('local-section').style.display = isCloud ? 'none' : '';
  document.getElementById('cloud-section').style.display = isCloud ? '' : 'none';
  setTimeout(() => {
    (isCloud ? document.getElementById('cloud-url') : document.getElementById('ip'))?.focus();
  }, 50);
}

(async () => {
  const cfg = await window.electronAPI.getConfig();
  if (cfg && cfg.connectionMode === 'cloud') {
    setMode('cloud');
    if (cfg.cloudServerUrl) document.getElementById('cloud-url').value = cfg.cloudServerUrl;
  } else {
    if (cfg && cfg.serverIp) document.getElementById('ip').value = cfg.serverIp;
  }
  if (cfg && cfg.machineId) document.getElementById('mid').value = cfg.machineId;
  else document.getElementById('mid').value = 'KDS-01';
})();

async function connect() {
  const mid = document.getElementById('mid').value.trim();
  const err = document.getElementById('err');
  err.textContent = '';
  if (!mid) { err.textContent = 'Machine ID is required.'; return; }
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = 'Connecting…';

  if (currentMode === 'cloud') {
    const cloudUrl = document.getElementById('cloud-url').value.trim().replace(/\/+$/, '');
    if (!cloudUrl) { err.textContent = 'Cloud Server URL is required.'; btn.disabled = false; btn.textContent = '▶ Connect (goes fullscreen)'; return; }
    await window.electronAPI.saveAndConnect({ connectionMode: 'cloud', cloudServerUrl: cloudUrl, machineId: mid });
  } else {
    const ip = document.getElementById('ip').value.trim();
    if (!ip) { err.textContent = 'Server IP is required.'; btn.disabled = false; btn.textContent = '▶ Connect (goes fullscreen)'; return; }
    await window.electronAPI.saveAndConnect({ connectionMode: 'local', serverIp: ip, machineId: mid });
  }
}
</script>
</body>
</html>
